# BS01 (VidSprout) Nginx (HTTP only) - Virtual hostnames via local hosts
# web.bs01.local   -> Web static
# admin.bs01.local -> Admin static
# api.bs01.local   -> API proxy + media

server {
    listen 80;
    server_name web.bs01.local;

    root /var/www/bs01/web;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf)$ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }
}

server {
    listen 80;
    server_name admin.bs01.local;

    root /var/www/bs01/admin;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf)$ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }
}

server {
    listen 80;
    server_name api.bs01.local;

    client_max_body_size 600m;

    location / {
        proxy_pass http://127.0.0.1:8000;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 300;
        proxy_connect_timeout 60;
    }

    location /media/ {
        alias /root/BS01/backend/media/;
        autoindex off;

        add_header Accept-Ranges bytes;
        expires 7d;
        add_header Cache-Control "public";
    }
}
